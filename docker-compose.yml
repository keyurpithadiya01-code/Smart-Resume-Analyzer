services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/resume_analyzer
      JWT_SECRET: change_me_in_production
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

volumes:
  mongo_data:
